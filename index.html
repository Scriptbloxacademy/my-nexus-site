<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS COOKIE CLICKER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <aside class="shop-panel">
            <h2 class="shop-header">SHOP</h2>
            <div id="shop-list"></div>
        </aside>

        <main class="game-center">
            <div class="stats-float">
                <h1 id="cookie-total">0</h1>
                <p id="cps-val">per second: 0.0</p>
            </div>
            
            <div class="cookie-stage">
                <div id="cookie-hitbox" class="cookie-element">
                    <div class="chip"></div>
                    <div class="chip"></div>
                    <div class="chip"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
