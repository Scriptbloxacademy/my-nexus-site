<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Clicker | Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <section class="main-clicker">
            <div class="stats">
                <h1 id="cookie-count">0</h1>
                <p id="cps-display">CPS: 0.0</p>
            </div>
            <div class="cookie-wrapper">
                <div id="cookie" class="cookie"></div>
            </div>
        </section>

        <aside class="shop">
            <div class="shop-header">UPGRADES</div>
            <div id="upgrade-list" class="upgrade-list">
                <!-- Upgrades injected by JS -->
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
